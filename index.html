<!doctype html>
<html lang="pt-BR" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Gume</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <link rel="icon" href="/assets/imgs/portalGume.ico">
</head>

<body class="h-full">
  <div id="preloader"><div class="loader"></div></div>
  <div id="app-wrapper" class="min-h-full w-full overflow-auto relative"><!-- Animated Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none" id="bg-container">
      <div class="blob w-72 h-72 -top-20 -left-20" style="background: #a0a2e3;" id="blob1"></div>
      <div class="blob w-96 h-96 top-1/3 -right-32" style="background: #888ac4; animation-delay: -2s;" id="blob2"></div>
      <div class="blob w-64 h-64 bottom-20 left-1/4" style="background: #6c6ea1; animation-delay: -4s;" id="blob3">
      </div>
    </div><!-- Main Content -->
    <main class="relative z-10 flex flex-col items-center justify-start px-4 py-12 min-h-full">
      <section id="perfil" class="w-full flex flex-col items-center">
      <div class="fade-in-up delay-1">
        <div class="relative mb-6">
          <div class="w-28 h-28 rounded-full animate-pulse-ring absolute inset-0" id="profile-ring"
            style="background: linear-gradient(135deg, #888ac4, #6c6ea1);"></div>
          <div class="w-28 h-28 rounded-full p-1 relative"
            style="background: linear-gradient(135deg, #888ac4, #6c6ea1);">
            <div class="w-full h-full rounded-full flex items-center justify-center text-4xl" id="profile-avatar"
              style="background: #1a1a2e;">
              <img src="/assets/imgs/logoPortalGume-1080x1080.png" alt="">
            </div>
          </div>
        </div>
      </div><!-- Name & Bio -->
      <div class="text-center mb-8 fade-in-up delay-2">
        <h1 class="text-3xl font-bold mb-2" id="profile-name" style="color: #ffffff;">@portalgume</h1>
        <p class="text-lg opacity-80 max-w-xs" id="profile-bio" style="color: #e0e0e0;">🔥 Achadinhos que valem a pena | 🎮 Gadgets & setups | 💡 Coisas úteis e diferentes ↓</p>
      </div>
      
      <section id="links" class="w-full max-w-md space-y-4 mb-10">
        <a href="https://shopee.com.br/portalgume" target="_blank" rel="noopener noreferrer"
          class="link-btn block w-full p-4 rounded-2xl glass fade-in-up delay-3"
          id="link-shopee" style="background: rgba(238,77,45,0.2); border: 1px solid rgba(238,77,45,0.3);">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background: #ee4d2d;">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M6 7V6a4 4 0 018 0v1h3a1 1 0 011 1v11a2 2 0 01-2 2H4a2 2 0 01-2-2V8a1 1 0 011-1h3zm2-1a2 2 0 104 0H8z" />
              </svg>
            </div>
            <span class="font-semibold text-lg flex-1" id="text-shopee" style="color: #ffffff;">Loja na Shopee</span>
            <svg class="w-5 h-5 opacity-60" style="color: #ffffff;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </div>
        </a>
        <a href="https://www.tiktok.com/@portalgume" target="_blank" rel="noopener noreferrer"
          class="link-btn block w-full p-4 rounded-2xl glass fade-in-up delay-4" id="link-tiktok"
          style="background: rgba(78,205,196,0.2); border: 1px solid rgba(78,205,196,0.3);">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background: #000000;">
              <svg class="w-6 h-6 text-white" fill="currentColor" viewbox="0 0 24 24">
                <path
                  d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-5.2 1.74 2.89 2.89 0 012.31-4.64 2.93 2.93 0 01.88.13V9.4a6.84 6.84 0 00-1-.05A6.33 6.33 0 005 20.1a6.34 6.34 0 0010.86-4.43v-7a8.16 8.16 0 004.77 1.52v-3.4a4.85 4.85 0 01-1-.1z" />
              </svg>
            </div><span class="font-semibold text-lg flex-1" id="text-tiktok" style="color: #ffffff;">TikTok</span>
            <svg class="w-5 h-5 opacity-60" style="color: #ffffff;" fill="none" stroke="currentColor"
              viewbox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </div>
        </a>
        <a href="https://t.me/+c9qkP1Xtufs1Y2Ix" target="_blank" rel="noopener noreferrer"
          class="link-btn block w-full p-4 rounded-2xl glass fade-in-up delay-5"
          id="link-telegram" style="background: rgba(0,136,204,0.2); border: 1px solid rgba(0,136,204,0.3);">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background: #0088cc;">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21.5 4.5L3.5 11l5.5 2 8.5-7-6.5 8 7 2.5 3-12z" />
              </svg>
            </div>
            <span class="font-semibold text-lg flex-1" id="text-telegram" style="color: #ffffff;">Canal no Telegram</span>
            <svg class="w-5 h-5 opacity-60" style="color: #ffffff;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </div>
        </a>
        <a href="https://chat.whatsapp.com/HNWpElHsQB1FxcERnz3ALx" target="_blank" rel="noopener noreferrer"
          class="link-btn block w-full p-4 rounded-2xl glass fade-in-up delay-6"
          id="link-whatsapp" style="background: rgba(37,211,102,0.2); border: 1px solid rgba(37,211,102,0.3);">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background: #25D366;">
              <svg class="w-6 h-6 text-white" fill="currentColor" viewbox="0 0 24 24">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
              </svg>
            </div>
            <span class="font-semibold text-lg flex-1" id="text-whatsapp" style="color: #ffffff;">WhatsApp</span>
            <svg class="w-5 h-5 opacity-60" style="color: #ffffff;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </div>
        </a>
      </section>

      
      
      <!-- Footer -->
      <footer class="text-center opacity-50 text-sm fade-in-up delay-7" style="color: #ffffff;">
        <p>Feito com 💜</p>
      </footer>
      
    </main>
  </div>
  <script src="assets/js/script.js"></script>
</body>

</html>
